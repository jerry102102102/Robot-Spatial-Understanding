schema_version: robot-spatial-task-spec.v1
task_id: PickCube-v1
entities:
  cube: cube
  goal: goal
  tcp: tcp
  left_finger: left_finger
  right_finger: right_finger
  panda_joint1: panda_joint1
  panda_joint2: panda_joint2
  panda_joint3: panda_joint3
  panda_joint4: panda_joint4
  panda_joint5: panda_joint5
  panda_joint6: panda_joint6
  panda_joint7: panda_joint7
  panda_finger_joint1: panda_finger_joint1
  panda_finger_joint2: panda_finger_joint2
requirements:
  channels: [joint_state, pose]
predicates:
  - predicate_id: cube_at_goal
    type: frame_position_within_tolerance
    parameters:
      entity: cube
      target: {entity: goal}
      position_tolerance_m: 0.025
  - predicate_id: robot_static
    type: joint_velocity_below_threshold
    parameters:
      joints:
        [panda_joint1, panda_joint2, panda_joint3, panda_joint4,
         panda_joint5, panda_joint6, panda_joint7]
      maximum_abs_velocity: 0.2
  - predicate_id: left_finger_contact
    type: contact_sustained
    parameters:
      pair: [left_finger, cube]
      minimum_duration_s: 0.2
      minimum_normal_force_n: 0.5
  - predicate_id: right_finger_contact
    type: contact_sustained
    parameters:
      pair: [right_finger, cube]
      minimum_duration_s: 0.2
      minimum_normal_force_n: 0.5
  - predicate_id: gripper_closed
    type: joint_position_in_range
    parameters:
      ranges:
        panda_finger_joint1: [0.0, 0.035]
        panda_finger_joint2: [0.0, 0.035]
  - predicate_id: cube_follows_tcp
    type: object_follows_frame_for_duration
    parameters:
      reference: tcp
      target: cube
      minimum_duration_s: 0.2
      position_tolerance_m: 0.01
      orientation_tolerance_rad: 0.05
  - predicate_id: cube_lifted
    type: object_above_height
    parameters:
      entity: cube
      axis: z
      minimum_delta_m: 0.02
  - predicate_id: grasped
    type: object_grasped
    parameters:
      contact_predicates: [left_finger_contact, right_finger_contact]
      gripper_predicate: gripper_closed
      follows_predicate: cube_follows_tcp
      lift_predicate: cube_lifted
  - predicate_id: collision_free
    type: collision_free_over_interval
    parameters:
      allowed_pairs:
        - [cube, table]
        - [left_finger, cube]
        - [right_finger, cube]
        - [cube, panda_hand]
      ignored_pairs:
        - [left_finger, table]
        - [right_finger, table]
goal:
  all: [cube_at_goal, robot_static]
failure:
  any:
    - not: {predicate: cube_at_goal}
    - not: {predicate: robot_static}
termination:
  mode: episode_end
claim_boundaries:
  simulation_only: true
  causation_requires_counterfactual: true
  authorization_established: false
  safety_established: false
