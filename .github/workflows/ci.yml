name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s scripts/tests -p 'test_*.py'
      - run: robot-spatial --version
      - run: robot-spatial import --adapter generic-json examples/pickcube/trace.json --out work/pickcube-run
      - run: robot-spatial evaluate work/pickcube-run --task examples/pickcube/task.yaml --out work/pickcube-result
      - run: robot-spatial explain work/pickcube-result/report.json --out work/pickcube-result/report.md

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
